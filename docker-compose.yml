services:
  jmg:
    image: ghcr.io/woor1668/jmg:latest
    build: .
    container_name: jmg
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - BASE_URL=${BASE_URL:-}
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
